// ===== SYSTEM FUNCTIONS =====

function getTotalSteps() {
  let total = 0;
  modules.forEach(module => {
    total += module.lessons.length + module.quiz.length;
  });
  return total;
}

function getCurrentStep() {
  let step = 0;

  for (let i = 0; i < moduleIndex; i++) {
    step += modules[i].lessons.length + modules[i].quiz.length;
  }

  if (mode === "lesson") {
    step += lessonIndex;
  } else {
    step += modules[moduleIndex].lessons.length + quizIndex;
  }

  return step;
}

function renderQuestion(q) {
  let html = `<p><strong>${q.q}</strong></p>`;
  q.a.forEach((opt, i) => {
    html += `<button class="answer-btn" onclick="checkAnswer(${i})">${opt}</button>`;
  });
  return html;
}

function load() {
  const module = modules[moduleIndex];

  document.getElementById("module").innerText = module.name;

  if (mode === "lesson") {
    document.getElementById("title").innerText = "Lesson " + (lessonIndex + 1);
    document.getElementById("content").innerHTML = `<p>${module.lessons[lessonIndex]}</p>`;
    document.getElementById("nextBtn").style.display = "block";
  }

  if (mode === "quiz") {
    document.getElementById("title").innerText = "Question " + (quizIndex + 1);
    document.getElementById("content").innerHTML = renderQuestion(module.quiz[quizIndex]);
    document.getElementById("nextBtn").style.display = "none";
  }
}

function checkAnswer(i) {
  const module = modules[moduleIndex];
  const correct = module.quiz[quizIndex].correct;

  if (i === correct) {
    alert("Correct");
  } else {
    alert("Try again");
    return;
  }

  quizIndex++;

  if (quizIndex >= module.quiz.length) {
    moduleIndex++;
    quizIndex = 0;
    lessonIndex = 0;
    mode = "lesson";

    if (moduleIndex >= modules.length) {
      window.location.href = "certificate-choice.html";
      return;
    }
  }

  load();
}

function next() {
  lessonIndex++;

  if (lessonIndex >= modules[moduleIndex].lessons.length) {
    mode = "quiz";
    lessonIndex = 0;
  }

  load();
}

load();

</script>
