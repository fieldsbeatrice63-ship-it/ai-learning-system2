<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumi AI Nexus™ | Cover</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #8fd0ff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .cover-shell {
      width: 100%;
      max-width: 980px;
      text-align: center;
    }

    .cover-card {
      border-radius: 24px;
      overflow: hidden;
    }

    .cover-image {
      width: 100%;
      display: block;
      border-radius: 24px;
      box-shadow: 0 18px 38px rgba(15, 45, 95, 0.22);
    }

    .button-wrap {
      margin-top: 22px;
      display: flex;
      justify-content: center;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 240px;
      padding: 16px 28px;
      border-radius: 999px;
      border: none;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(180deg, #4aa9ff, #215fe5);
      box-shadow:
        0 10px 24px rgba(33, 95, 229, 0.30),
        inset 0 2px 0 rgba(255,255,255,0.28);
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .cover-image {
        border-radius: 18px;
      }

      .start-btn {
        min-width: 210px;
        font-size: 20px;
        padding: 15px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="cover-shell">
    <div class="cover-card">
      <img
        src="cover.png"
        alt="Lumi AI Nexus cover page"
        class="cover-image"
      />
    </div>

    <div class="button-wrap">
      <a href="welcome.html" class="start-btn">Get Started</a>
    </div>
  </div>
</body>
</html>
