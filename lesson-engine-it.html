          {
            q: "A technician receives AI-generated guidance for a recurring server issue and notices that one recommendation conflicts with established internal procedure. What is the strongest next step?",
            a: ["Follow the AI guidance because it is newer than internal process", "Review the conflict and follow approved internal procedure unless a formal change justifies updating it", "Ignore internal procedure if AI sounds more confident", "Use whichever option is faster without notifying the team"],
            correct: 1
          },
          {
            q: "A junior technician wants to apply an AI-recommended network change to prove initiative and reduce recurring complaints. The change affects multiple users, and the technician is not authorized to approve it alone. What is the correct action?",
            a: ["Apply the change to show leadership", "Document findings and escalate through the proper approval path", "Ask one user for permission and then proceed", "Test it in production quietly before anyone notices"],
            correct: 1
          },
          {
            q: "What best describes strong real-world AI use in IT operations?",
            a: ["Using AI recommendations as direct commands whenever they save time", "Using AI as support within controlled troubleshooting, security awareness, and change-management judgment", "Avoiding all AI because real IT work should stay manual", "Letting AI replace process so teams can move faster"],
            correct: 1
          }
        ]
      }
    ];

    function getTotalSteps() {
      let total = 0;
      modules.forEach(module => {
        total += module.lessons.length + module.quiz.length;
      });
      return total;
    }

    function getCurrentStep() {
      let step = 0;

      for (let i = 0; i < moduleIndex; i++) {
        step += modules[i].lessons.length + modules[i].quiz.length;
      }

      if (mode === "lesson") {
        step += lessonIndex;
      } else {
        step += modules[moduleIndex].lessons.length + quizIndex;
      }

      return step;
    }

    function updateProgress() {
      const progressBar = document.getElementById("progressBar");
      const totalSteps = getTotalSteps();
      const currentStep = getCurrentStep();
      const progressPercent = (currentStep / totalSteps) * 100;
      progressBar.style.width = progressPercent + "%";
    }

    function renderQuestion(q) {
      let html = `<div class="question-text">${q.q}</div>`;
      q.a.forEach((opt, i) => {
        html += `<button class="answer-btn" onclick="checkAnswer(${i})">${opt}</button>`;
      });
      return html;
    }

    function load() {
      const title = document.getElementById("title");
      const content = document.getElementById("content");
      const nextBtn = document.getElementById("nextBtn");
      const moduleLabel = document.getElementById("moduleLabel");

      const module = modules[moduleIndex];

      updateProgress();
      moduleLabel.innerText = module.name;

      if (mode === "lesson") {
        title.innerText = "Lesson " + (lessonIndex + 1);
        content.innerHTML = `<p>${module.lessons[lessonIndex]}</p>`;
        nextBtn.style.display = "block";
      }

      if (mode === "quiz") {
        title.innerText = "Question " + (quizIndex + 1);
        content.innerHTML = renderQuestion(module.quiz[quizIndex]);
        nextBtn.style.display = "none";
      }
    }

    function checkAnswer(i) {
      const module = modules[moduleIndex];
      const correct = module.quiz[quizIndex].correct;

      if (i === correct) {
        alert("Correct!");
      } else {
        alert("Incorrect. Try again.");
        return;
      }

      quizIndex++;

      if (quizIndex < module.quiz.length) {
        load();
      } else {
        alert(module.name + " Complete!");
        moduleIndex++;
        lessonIndex = 0;
        quizIndex = 0;
        mode = "lesson";

        if (moduleIndex >= modules.length) {
          localStorage.setItem("courseName", "AI in Technology & IT Systems™");
          localStorage.setItem("courseSubtitle", "Completed all modules and assessments");
          localStorage.setItem("issueDate", new Date().toLocaleDateString());
          localStorage.setItem("certificateId", "LUMI-" + Math.floor(10000 + Math.random() * 90000));

          window.location.href = "certificate-choice.html";
        } else {
          load();
        }
      }
    }

    function next() {
      const module = modules[moduleIndex];

      if (mode === "lesson") {
        lessonIndex++;

        if (lessonIndex >= module.lessons.length) {
          mode = "quiz";
          lessonIndex = 0;
        }

        load();
      }
    }

    load();
  </script>
</body>
</html>
