let moduleIndex = 0;
let lessonIndex = 0;
let quizIndex = 0;
let mode = "lesson";

function load(){
  let currentModule = modules[moduleIndex];
  document.getElementById("module").innerText = currentModule.name;

  if(mode==="lesson"){
    document.getElementById("title").innerText = "Lesson " + (lessonIndex+1);
    document.getElementById("content").innerText = currentModule.lessons[lessonIndex];
  } else {
    let q = currentModule.quiz[quizIndex];
    document.getElementById("title").innerText = "Question " + (quizIndex+1);
    document.getElementById("content").innerText = q.q;
  }
}

function next(){
  let currentModule = modules[moduleIndex];

  if(mode==="lesson"){
    lessonIndex++;
    if(lessonIndex >= currentModule.lessons.length){
      lessonIndex = 0;
      mode = "quiz";
    }
  } else {
    quizIndex++;
    if(quizIndex >= currentModule.quiz.length){
      quizIndex = 0;
      moduleIndex++;
      mode = "lesson";
      if(moduleIndex >= modules.length){
        alert("Course Complete!");
        return;
      }
    }
  }

  load();
}
