<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Certificate | Lumi AI Nexus™</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #eaf6ff, #d8efff);
  padding: 30px;
  color: #173b79;
}

.container {
  max-width: 900px;
  margin: auto;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

p {
  color: #355171;
}

.input-box {
  margin: 20px 0;
}

input {
  padding: 12px;
  width: 70%;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  background: #215fe5;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-left: 10px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card h3 {
  margin-bottom: 10px;
}

.card a {
  display: block;
  margin-top: 15px;
  padding: 10px;
  background: #4aa9ff;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <h1>🎉 Certificate Unlocked</h1>
  <p>Enter your name and choose your certificate style.</p>

  <div class="input-box">
    <input type="text" id="name" placeholder="Enter your full name">
    <button onclick="saveName()">Save</button>
  </div>

  <div class="cards">

    <div class="card">
      <h3>Branded Certificate</h3>
      <p>Includes Lumi design and identity</p>
      <a href="certificate-branded.html">View</a>
    </div>

    <div class="card">
      <h3>Foundations Certificate</h3>
      <p>Clean structured layout</p>
      <a href="certificate-foundations.html">View</a>
    </div>

    <div class="card">
      <h3>Professional Certificate</h3>
      <p>Formal presentation style</p>
      <a href="certificate-professional.html">View</a>
    </div>

  </div>

</div>

<script>

function saveName() {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("Enter your name first");
    return;
  }

  const date = new Date().toLocaleDateString();
  const id = "LUMI-" + Math.floor(Math.random() * 100000);

  localStorage.setItem("studentName", name);
  localStorage.setItem("issueDate", date);
  localStorage.setItem("certificateId", id);
  localStorage.setItem("courseName", "AI Foundations™");
  localStorage.setItem("courseSubtitle", "Completed all modules and assessments");

  alert("Saved! Now choose your certificate.");
}

</script>

</body>
</html>
