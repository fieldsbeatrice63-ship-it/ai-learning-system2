function load(){
let m=modules[moduleIndex];
document.getElementById("module").innerText=m.name;
if(mode==="lesson"){
document.getElementById("title").innerText="Lesson "+(lessonIndex+1);
document.getElementById("content").innerText=m.lessons[lessonIndex];
}else{
let q=m.quiz[quizIndex];
document.getElementById("title").innerText="Question "+(quizIndex+1);
document.getElementById("content").innerText=q.q;
}
}

function next(){
let m=modules[moduleIndex];
if(mode==="lesson"){
lessonIndex++;
if(lessonIndex>=m.lessons.length){lessonIndex=0;mode="quiz";}
}else{
quizIndex++;
if(quizIndex>=m.quiz.length){
quizIndex=0;moduleIndex++;mode="lesson";
if(moduleIndex>=modules.length){alert("Course Complete!");return;}
}}
