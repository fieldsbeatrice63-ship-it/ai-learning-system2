<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumi AI Nexus™ | AI Everyday Applications™</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eaf6ff 0%, #d8efff 100%);
      color: #173b79;
    }

    .top-bar {
      width: 100%;
      height: 8px;
      background: #cce6ff;
    }

    .progress {
      height: 8px;
      width: 0%;
      background: linear-gradient(90deg, #4aa9ff, #215fe5);
      transition: width 0.35s ease;
    }

    .wrap {
      max-width: 920px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 30px 28px;
      box-shadow: 0 18px 40px rgba(20, 59, 121, 0.12);
    }

    .module-title {
      font-size: 14px;
      font-weight: 700;
      color: #4a78c2;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .lesson-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #173b79;
      line-height: 1.2;
    }

    .content {
      font-size: 18px;
      line-height: 1.75;
      color: #355171;
    }

    .content p {
      margin: 0 0 14px;
    }

    .question-text {
      font-size: 22px;
      font-weight: 700;
      color: #173b79;
      margin-bottom: 18px;
      line-height: 1.45;
    }

    button {
      margin-top: 20px;
      padding: 15px 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #4aa9ff, #215fe5);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      box-shadow:
        0 10px 20px rgba(33, 95, 229, 0.25),
        inset 0 2px 0 rgba(255,255,255,0.3);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .answer-btn {
      margin: 12px 0;
      background: #f3f8ff;
      color: #173b79;
      box-shadow: none;
      border: 1px solid #d6e6ff;
    }

    .answer-btn:hover {
      background: #e4f1ff;
      filter: none;
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #58739b;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .wrap {
        margin: 24px auto;
        padding: 14px;
      }

      .card {
        padding: 22px 18px;
      }

      .lesson-title {
        font-size: 24px;
      }

      .content,
      .question-text {
        font-size: 17px;
      }
    }
  </style>
</head>

            correct: 1
          },
          {
            q: "The strongest everyday AI user is the one who:",

    ];

    function getTotalSteps() {
      let total = 0;
      modules.forEach(module => {
        total += module.lessons.length + module.quiz.length;
      });
      return total;
    }

    function getCurrentStep() {
      let step = 0;

      for (let i = 0; i < moduleIndex; i++) {
        step += modules[i].lessons.length + modules[i].quiz.length;
      }

      if (mode === "lesson") {
        step += lessonIndex;
      } else {
        step += modules[moduleIndex].lessons.length + quizIndex;
      }

      return step;
    }

    function updateProgress() {
      const progressBar = document.getElementById("progressBar");
      const totalSteps = getTotalSteps();
      const currentStep = getCurrentStep();
      const progressPercent = (currentStep / totalSteps) * 100;
      progressBar.style.width = progressPercent + "%";
    }

    function renderQuestion(q) {
      let html = `<div class="question-text">${q.q}</div>`;
      q.a.forEach((opt, i) => {
        html += `<button class="answer-btn" onclick="checkAnswer(${i})">${opt}</button>`;
      });
      return html;
    }

    function load() {
      const title = document.getElementById("title");
      const content = document.getElementById("content");
      const nextBtn = document.getElementById("nextBtn");
      const moduleLabel = document.getElementById("moduleLabel");

      const module = modules[moduleIndex];

      updateProgress();
      moduleLabel.innerText = module.name;

      if (mode === "lesson") {
        title.innerText = "Lesson " + (lessonIndex + 1);
        content.innerHTML = `<p>${module.lessons[lessonIndex]}</p>`;
        nextBtn.style.display = "block";
      }

      if (mode === "quiz") {
        title.innerText = "Question " + (quizIndex + 1);
        content.innerHTML = renderQuestion(module.quiz[quizIndex]);
        nextBtn.style.display = "none";
      }
    }

    function checkAnswer(i) {
      const module = modules[moduleIndex];
      const correct = module.quiz[quizIndex].correct;

      if (i === correct) {
        alert("Correct!");
      } else {
        alert("Incorrect. Try again.");
        return;
      }

      quizIndex++;

      if (quizIndex < module.quiz.length) {
        load();
      } else {
        alert(module.name + " Complete!");
        moduleIndex++;
        lessonIndex = 0;
        quizIndex = 0;
        mode = "lesson";

        if (moduleIndex >= modules.length) {
          localStorage.setItem("courseName", "AI Everyday Applications™");
          localStorage.setItem("courseSubtitle", "Completed all modules and assessments");
          localStorage.setItem("issueDate", new Date().toLocaleDateString());
          localStorage.setItem("certificateId", "LUMI-" + Math.floor(10000 + Math.random() * 90000));

          window.location.href = "certificate-choice.html";
        } else {
          load();
        }
      }
    }

    function next() {
      const module = modules[moduleIndex];

      if (mode === "lesson") {
        lessonIndex++;

        if (lessonIndex >= module.lessons.length) {
          mode = "quiz";
          lessonIndex = 0;
        }

        load();
      }
    }

    load();
  </script>
</body>
</html>
