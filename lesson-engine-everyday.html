let moduleIndex = 0;
let lessonIndex = 0;
let quizIndex = 0;
let mode = "lesson";
let answeredCurrentQuestion = false;

function renderStructuredLesson(lesson) {
  return `
    <div class="lesson-block">
      <div class="lesson-label">Core Truth</div>
      <div class="lesson-text">${lesson.coreTruth}</div>
    </div>

    <div class="lesson-block">
      <div class="lesson-label">Why This Matters</div>
      <div class="lesson-text">${lesson.whyItMatters}</div>
    </div>

    <div class="lesson-block">
      <div class="lesson-label">Real-World Example</div>
      <div class="lesson-text">${lesson.realWorld}</div>
    </div>

    <div class="lesson-block">
      <div class="lesson-label">Decision Skill</div>
      <div class="lesson-text">${lesson.decisionSkill}</div>
    </div>

    <div class="transition-note">
      Review the lesson above, then begin the knowledge check.
    </div>
  `;
}

function renderQuestion(q) {
  let html = `<div style="font-size:18px; line-height:1.6; margin-bottom:18px;">${q.q}</div>`;

  q.a.forEach((answer, index) => {
    html += `
      <button class="answer-btn" onclick="checkAnswer(${index})" id="answer-${index}">
        ${answer}
      </button>
    `;
  });

  html += `<div id="feedback"></div>`;
  return html;
}

function load() {
  const currentModule = modules[moduleIndex];
  const currentLesson = currentModule.lessons[lessonIndex];
  answeredCurrentQuestion = false;

  document.getElementById("module").innerText = currentModule.name;

  if (mode === "lesson") {
    document.getElementById("title").innerText = currentLesson.title;
    document.getElementById("content").innerHTML = renderStructuredLesson(currentLesson.lesson);
    document.getElementById("nextBtn").style.display = "inline-block";
    document.getElementById("nextBtn").innerText = "Start Knowledge Check";
  } else {
    const currentQuestion = currentLesson.quiz[quizIndex];
    document.getElementById("title").innerText = `${currentLesson.title} — Question ${quizIndex + 1}`;
    document.getElementById("content").innerHTML = renderQuestion(currentQuestion);
    document.getElementById("nextBtn").style.display = "none";
  }
}

function next() {
  const currentModule = modules[moduleIndex];
  const currentLesson = currentModule.lessons[lessonIndex];

  if (mode === "lesson") {
    mode = "quiz";
    quizIndex = 0;
    load();
    return;
  }

  if (!answeredCurrentQuestion) return;

  quizIndex++;

  if (quizIndex >= currentLesson.quiz.length) {
    quizIndex = 0;
    lessonIndex++;
    mode = "lesson";

    if (lessonIndex >= currentModule.lessons.length) {
      lessonIndex = 0;
      moduleIndex++;

      if (moduleIndex >= modules.length) {
        document.getElementById("module").innerText = "Course Complete";
        document.getElementById("title").innerText = "You completed AI Everyday Applications™";
        document.getElementById("content").innerHTML = `
          <div class="lesson-block">
            <div class="lesson-label">Completion</div>
            <div class="lesson-text">
              Excellent work. You completed this course successfully.
            </div>
          </div>
        `;
        document.getElementById("nextBtn").style.display = "none";
        return;
      }
    }
  }

  load();
}

function checkAnswer(selectedIndex) {
  if (answeredCurrentQuestion) return;

  const currentModule = modules[moduleIndex];
  const currentLesson = currentModule.lessons[lessonIndex];
  const currentQuestion = currentLesson.quiz[quizIndex];
  const buttons = document.querySelectorAll(".answer-btn");
  const feedback = document.getElementById("feedback");

  buttons.forEach((btn, index) => {
    btn.disabled = true;

    if (index === currentQuestion.correct) {
      btn.classList.add("correct");
    }

    if (index === selectedIndex && index !== currentQuestion.correct) {
      btn.classList.add("incorrect");
    }
  });

  if (selectedIndex === currentQuestion.correct) {
    feedback.innerHTML = `
      <div class="feedback-box correct">
        <strong>Correct.</strong><br>
        ${currentQuestion.explanation}
      </div>
    `;
  } else {
    feedback.innerHTML = `
      <div class="feedback-box incorrect">
        <strong>Not quite.</strong><br>
        ${currentQuestion.explanation}
      </div>
    `;
  }

  answeredCurrentQuestion = true;
  document.getElementById("nextBtn").style.display = "inline-block";
  document.getElementById("nextBtn").innerText =
    quizIndex === currentLesson.quiz.length - 1 ? "Next Lesson" : "Next Question";
}

load();
</script>
